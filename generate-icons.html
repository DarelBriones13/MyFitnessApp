<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Icons</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            text-align: center;
        }
        canvas {
            border: 1px solid #ccc;
            margin: 20px;
        }
        button {
            background: #C6FF00;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            margin: 10px;
        }
    </style>
</head>
<body>
    <h1>Icon Generator</h1>
    <p>Click the buttons below to download the app icons</p>
    
    <canvas id="canvas192" width="192" height="192"></canvas>
    <canvas id="canvas512" width="512" height="512"></canvas>
    
    <br>
    <button onclick="downloadIcon(192)">Download 192x192 Icon</button>
    <button onclick="downloadIcon(512)">Download 512x512 Icon</button>
    
    <script>
        function drawIcon(size) {
            const canvas = document.getElementById(`canvas${size}`);
            const ctx = canvas.getContext('2d');
            
            // Background - dark
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, size, size);
            
            // Accent color - red
            ctx.fillStyle = '#e60000';
            
            // Draw dumbbell icon
            const scale = size / 192;
            const centerX = size / 2;
            const centerY = size / 2;
            
            // Left weight
            ctx.fillRect(30 * scale, 70 * scale, 25 * scale, 52 * scale);
            ctx.fillRect(20 * scale, 80 * scale, 10 * scale, 32 * scale);
            
            // Right weight
            ctx.fillRect(137 * scale, 70 * scale, 25 * scale, 52 * scale);
            ctx.fillRect(162 * scale, 80 * scale, 10 * scale, 32 * scale);
            
            // Bar - orange accent
            ctx.fillStyle = '#ff5a00';
            ctx.fillRect(55 * scale, 90 * scale, 82 * scale, 12 * scale);
            
            // Grips - cream accent
            ctx.fillStyle = '#ffeea4';
            ctx.fillRect(75 * scale, 85 * scale, 10 * scale, 22 * scale);
            ctx.fillRect(107 * scale, 85 * scale, 10 * scale, 22 * scale);
            
            // Text
            ctx.fillStyle = '#FFFFFF';
            ctx.font = `bold ${24 * scale}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillText('WORKOUT', centerX, 145 * scale);
            ctx.font = `${16 * scale}px sans-serif`;
            ctx.fillText('SPLITS', centerX, 165 * scale);
        }
        
        function downloadIcon(size) {
            const canvas = document.getElementById(`canvas${size}`);
            const link = document.createElement('a');
            link.download = `icon-${size}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }
        
        // Draw icons on load
        drawIcon(192);
        drawIcon(512);
    </script>
</body>
</html>
